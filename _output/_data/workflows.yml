- id: ingest
  title: Ingest
  blurb: Acquire, standardize, and load a source dataset into the integrated database.
    Cards are grouped by data provider.
  layout: cards
  count: 13
  groups:
  - label: CalCOFI
    items:
    - url: ingest_calcofi_bird_mammal_census.html
      title: ingest_calcofi_bird_mammal_census
      dataset_name: CalCOFI Bird & Mammal Census
      description: Bird and mammal observations along CalCOFI (and NMFS, CPR) cruise
        transects, 1987-2021. Transect effort + counts + species/behavior lookups.
        Curated via CCE-LTER DataZoo 255 (PI Bill Sydeman).
      coverage: 1987-05 to 2021-08
      color: '#f0d2e8'
      link_data_source: https://oceaninformatics.ucsd.edu/datazoo/catalogs/ccelter/datasets/255
      provider: calcofi
    - url: ingest_calcofi_bottle.html
      title: ingest_calcofi_bottle
      dataset_name: CalCOFI Bottle Database
      description: Hydrographic bottle data including temperature, salinity, oxygen,
        nutrients, pigments, and C14 from CalCOFI cruises.
      coverage: 1949-02 to 2021-05
      color: '#f5cad9'
      link_calcofi_org: https://calcofi.org/data/oceanographic-data/bottle-database/
      link_data_source: https://calcofi.org/downloads/database/CalCOFI_Database_194903-202105_csv_16October2023.zip
      provider: calcofi
    - url: ingest_calcofi_ctd-cast.html
      title: ingest_calcofi_ctd-cast
      dataset_name: CalCOFI CTD Cast Files
      description: CTD downcast profiles with temperature, salinity, oxygen, fluorescence,
        and other sensors at standard depths.
      coverage: 1998-01 to 2026-04
      color: '#e0ccf0'
      link_calcofi_org: https://calcofi.org/data/oceanographic-data/ctd-cast-files/
      link_data_source: https://calcofi.org/data/oceanographic-data/ctd-cast-files/
      provider: calcofi
    - url: ingest_calcofi_dic.html
      title: ingest_calcofi_dic
      dataset_name: CalCOFI DIC
      description: Discrete profile dissolved inorganic carbon (DIC) and total alkalinity
        (TA) from CalCOFI Niskin bottle samples, quality-controlled using WOCE flagging.
      coverage: 1983-03 to 2021-07
      color: '#ffd2bb'
      link_calcofi_org: https://calcofi.org/data/oceanographic-data/dic/
      link_data_source: https://www.ncei.noaa.gov/access/metadata/landing-page/bin/iso?id=gov.noaa.nodc:0301029
      provider: calcofi
    - url: ingest_calcofi_phyllosoma.html
      title: ingest_calcofi_phyllosoma
      dataset_name: CalCOFI Lobster Phyllosoma
      description: 'Spiny lobster (Panulirus interruptus) phyllosoma larvae counts
        by developmental stage from CalCOFI net tows, 1951-2008. Source: EDI knb-lter-cce.188.4
        (Koslow).'
      coverage: 1951-07 to 2009-07
      color: '#e0bbf0'
      link_data_source: https://portal.edirepository.org/nis/mapbrowse?packageid=knb-lter-cce.188.4
      provider: calcofi
    - url: ingest_calcofi_phytoplankton.html
      title: ingest_calcofi_phytoplankton
      dataset_name: CalCOFI Phytoplankton (Venrick)
      description: 'Abundance and species composition of phytoplankton (385 taxonomic
        categories) in the California Current, 1996-2022, by inverted-microscope counts
        (E. Venrick). Samples from the near-surface "second depth" are pooled across
        stations into four regions (NE, SE, Alley, Offshore; Hayward & Venrick 1998)
        before counting, so the grain is cruise x region, not per-station. Source:
        EDI knb-lter-cce.254.4.'
      coverage: 1996 to 2022
      color: '#b5e8b0'
      link_calcofi_org: https://calcofi.org/data/marine-ecosystem-data/phytoplankton-bacterioplankton/
      link_data_source: https://portal.edirepository.org/nis/mapbrowse?packageid=knb-lter-cce.254.4
      provider: calcofi
    - url: ingest_spatial.html
      title: ingest_spatial
      provider: calcofi
  - label: SWFSC
    items:
    - url: ingest_swfsc_cufes.html
      title: ingest_swfsc_cufes
      dataset_name: CalCOFI Underway CUFES Fish Eggs
      description: 'Continuous Underway Fish Egg Sampler (CUFES) egg counts (sardine,
        anchovy, jack mackerel, hake, squid, other) with underway environmental conditions,
        from CalCOFI cruises (1996-present). Source: NOAA CoastWatch ERDDAP erdCalCOFIcufes.'
      coverage: 1996-03 to 2022-04
      color: '#f0e8bb'
      link_data_source: https://coastwatch.pfeg.noaa.gov/erddap/tabledap/erdCalCOFIcufes.html
      provider: swfsc
    - url: ingest_swfsc_ichthyo.html
      title: ingest_swfsc_ichthyo
      dataset_name: SWFSC Ichthyoplankton
      description: Ichthyoplankton (fish eggs and larvae) collected by bongo and manta
        net tows on CalCOFI cruises, processed by SWFSC.
      coverage: 1951-01 to 2023-01
      color: '#cdebc6'
      link_calcofi_org: https://calcofi.org/data/biology/ichthyoplankton/
      provider: swfsc
  - label: SIO PIC
    items:
    - url: ingest_pic_zooplankton.html
      title: ingest_pic_zooplankton
      dataset_name: SIO PIC Zooplankton Net Tows
      description: Zooplankton net-tow sample registry from the SIO Pelagic Invertebrate
        Collection, filtered to the CalCOFI region. Position, time, depth, and gear
        metadata per tow. Biovolume measurements are not in the source file and are
        pending from the provider (see Questions for Data Providers).
      coverage: 1926-06 to 2024-04
      color: '#bbe0f0'
      link_data_source: SIO Pelagic Invertebrate Collection DB (CSV export)
      provider: pic
  - label: CCE-LTER
    items:
    - url: ingest_cce-lter_euphausiids.html
      title: ingest_cce-lter_euphausiids
      dataset_name: CCE-LTER Euphausiid Abundance
      description: Euphausiid (krill) abundance from CalCOFI / CCE-LTER net tows,
        1951-2019, one row per tow. Provisional pending provider answers on abundance
        units and taxonomic scope (see Questions for Data Providers).
      coverage: 1951-01 to 2019-04
      color: '#d2f0bb'
      link_data_source: https://portal.edirepository.org/ (EDI package TBD)
      provider: cce-lter
    - url: ingest_cce-lter_zoodb.html
      title: ingest_cce-lter_zoodb
      dataset_name: ZooDB Holoplankton Community
      description: Holoplankton abundance and carbon biomass by 33 higher taxa (copepods
        to family, plus amphipods, chaetognaths, salps, pyrosomes, pteropods, ostracods,
        foraminifera, radiolaria and more) from CalCOFI net tows, 1951-2021, enumerated
        by microscopy (Ohman Lab / SIO Pelagic Invertebrate Collection). One row per
        (sample, taxon, measurement_type); unpooled tows are station-resolved, pooled
        samples are per-cruise regional composites. Raw (uncorrected) abundance per
        1000 m3 and per m2, plus biomass mg C/m2.
      coverage: 1951-03 to 2015-04
      color: '#d9c2f0'
      link_calcofi_org: https://calcofi.org/data/marine-ecosystem-data/zooplankton/
      link_data_source: https://oceaninformatics.ucsd.edu/zoodb/
      provider: cce-lter
    - url: ingest_cce-lter_zooscan.html
      title: ingest_cce-lter_zooscan
      dataset_name: ZooScan PRPOOS Zooplankton
      description: 'Zooplankton abundance, carbon biomass, and size (Feret diameter,
        individual carbon content) from ZooScan optical imaging of CalCOFI / CCE-LTER
        PRPOOS net tows on lines 80, 87 and 90, 2005-present, machine-classified into
        23 bioclasses (copepod groups, euphausiids, chaetognaths, appendicularians,
        salps, doliolids, pteropods, rhizaria and more). One row per (sample, taxon,
        measurement_type); per-station tows. Source: SIO Ocean Informatics ZooScan
        portal (Ohman Lab; interface by Marina Frants).'
      coverage: 2005-07 to 2026-04
      color: '#c2e8f0'
      link_calcofi_org: https://calcofi.org/data/marine-ecosystem-data/zooplankton/
      link_data_source: https://oceaninformatics.ucsd.edu/zooscandb/
      provider: cce-lter
