<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <!-- apply saved theme before stylesheet load to avoid a flash -->
  <script>
    document.documentElement.dataset.theme =
      localStorage.getItem("theme") || "dark";
  </script>

  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/favicon-16x16.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

<div id="layout">

  <header class="app-header">
    <a class="app-logo" href="{{ '/' | relative_url }}" aria-label="CalCOFI Workflows — home">
      <img class="logo-dark"  src="{{ '/assets/logo_calcofi.svg'       | relative_url }}" alt="CalCOFI" width="32" height="32">
      <img class="logo-light" src="{{ '/assets/logo_calcofi_light.svg' | relative_url }}" alt="CalCOFI" width="32" height="32">
    </a>
    <h1>{{ site.title }}</h1>

    <span class="spacer"></span>

    <nav class="header-links">
      <a href="https://calcofi.io/schema/">schema</a>
      <a href="https://calcofi.io/query/">query</a>
      <a href="https://calcofi.io/docs/">docs</a>
    </nav>

    <button id="theme-toggle" type="button" aria-label="Toggle dark / light theme">🌓</button>
  </header>

  <main id="panel">
    {{ content }}
    <footer class="app-footer">
      <p>
        Source · <a href="https://github.com/CalCOFI/workflows">CalCOFI/workflows</a>
        · See also · <a href="https://calcofi.io/schema/">schema</a>
        · <a href="https://calcofi.io/query/">query</a>
        · <a href="https://calcofi.io/docs/">docs</a>
        · <a href="https://calcofi.io/calcofi4r/">calcofi4r</a>
        · <a href="https://calcofi.io/uptime/">uptime</a>
      </p>
    </footer>
  </main>

</div>

<script>
  document.getElementById("theme-toggle").addEventListener("click", () => {
    const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
    document.documentElement.dataset.theme = next;
    localStorage.setItem("theme", next);
  });
</script>
</body>
</html>
