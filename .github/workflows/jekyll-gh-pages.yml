# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Regenerate the landing-page index from each notebook's `calcofi:` YAML so
      # newly added/removed workflows appear at calcofi.io/workflows/ on push,
      # without anyone re-running scripts/build_workflows_index.R by hand. These
      # steps are best-effort (continue-on-error): if R setup ever breaks, the
      # committed _output/_data/workflows.yml is used and the deploy still runs.
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        continue-on-error: true
        with:
          use-public-rspm: true
      - name: Install index-builder R deps
        continue-on-error: true
        run: |
          install.packages(
            c("librarian", "rmarkdown", "yaml"),
            repos = Sys.getenv("RSPM", "https://cloud.r-project.org"))
        shell: Rscript {0}
      - name: Build workflows index (_data/workflows.yml)
        continue-on-error: true
        run: Rscript scripts/build_workflows_index.R
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./_output
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
